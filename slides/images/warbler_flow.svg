<svg viewBox="0 0 1000 240" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'IBM Plex Mono','Courier New',monospace">
  <title>Workflow de warbleR</title>
  <desc>La tabla y los WAV que pasan QC entran en warbleR, que produce tablas de selección, espectrogramas por lotes y medidas acústicas; Rraven conecta con Raven.</desc>
  <rect x="0" y="0" width="1000" height="240" rx="14" fill="#0B0E13"/>
  <defs>
    <marker id="war" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#7C8896"/></marker>
  </defs>
  <!-- entrada -->
  <rect x="20" y="86" width="210" height="56" rx="9" fill="#211c14" stroke="#E8A55C"/>
  <text x="125" y="111" text-anchor="middle" font-size="14" fill="#ECEFF3">tabla + WAV</text>
  <text x="125" y="130" text-anchor="middle" font-size="12.5" fill="#5FB89A">que pasan QC</text>
  <!-- flecha -->
  <line x1="230" y1="114" x2="268" y2="114" stroke="#7C8896" stroke-width="1.6" marker-end="url(#war)"/>
  <!-- warbleR -->
  <rect x="270" y="86" width="150" height="56" rx="9" fill="#12161D" stroke="#5FB89A"/>
  <text x="345" y="119" text-anchor="middle" font-size="17" fill="#5FB89A">warbleR</text>
  <!-- 3 flechas a salidas -->
  <g stroke="#7C8896" stroke-width="1.6" marker-end="url(#war)" fill="none">
    <path d="M420,108 C450,108 450,58 478,58"/>
    <line x1="420" y1="114" x2="478" y2="114"/>
    <path d="M420,120 C450,120 450,170 478,170"/>
  </g>
  <!-- salidas -->
  <g font-size="13.5">
    <rect x="480" y="36" width="300" height="44" rx="8" fill="#12161D" stroke="#E8A55C"/>
    <text x="630" y="63" text-anchor="middle" fill="#E8A55C">tablas de selección</text>
    <rect x="480" y="92" width="300" height="44" rx="8" fill="#12161D" stroke="#E8A55C"/>
    <text x="630" y="119" text-anchor="middle" fill="#E8A55C">espectrogramas por lotes</text>
    <rect x="480" y="148" width="300" height="44" rx="8" fill="#12161D" stroke="#E8A55C"/>
    <text x="630" y="175" text-anchor="middle" fill="#E8A55C">medidas acústicas</text>
  </g>
  <!-- Rraven / Raven -->
  <text x="800" y="100" font-size="12.5" fill="#7C8896">Rraven</text>
  <text x="800" y="118" font-size="16" fill="#7C8896">↕</text>
  <text x="800" y="136" font-size="12.5" fill="#7C8896">Raven</text>
  <text x="20" y="224" font-size="12.5" fill="#7C8896">Se apoya en seewave + tuneR · flujo estandarizado de análisis de señal (Araya-Salas &amp; Smith-Vidaurre 2017)</text>
</svg>
