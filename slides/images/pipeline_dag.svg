<svg viewBox="0 0 1000 360" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'IBM Plex Mono','Courier New',monospace">
  <title>Grafo del pipeline de targets</title>
  <desc>audio_files va a meta_raw y a meta_qc; meta_qc alimenta qc_report y gaps, y continua por good_files, indices, final_table y final_csv; sites_file y sites se unen en final_table.</desc>
  <rect x="0" y="0" width="1000" height="360" rx="14" fill="#0B0E13"/>
  <defs>
    <marker id="par" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#7C8896"/></marker>
    <marker id="parA" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#E8A55C"/></marker>
  </defs>
  <g fill="#5FB89A" font-size="13" letter-spacing="2">
    <text x="20" y="28">INGESTA</text>
    <text x="298" y="28">METADATOS · QC</text>
    <text x="600" y="28">PROCESADO</text>
    <text x="824" y="28">TABLA</text>
  </g>
  <g stroke="#7C8896" stroke-width="1.6" marker-end="url(#par)" fill="none">
    <line x1="144" y1="88" x2="166" y2="88"/>
    <line x1="288" y1="88" x2="310" y2="88"/>
    <line x1="432" y1="88" x2="474" y2="88"/>
    <line x1="596" y1="88" x2="618" y2="88"/>
    <line x1="716" y1="88" x2="738" y2="88"/>
    <line x1="868" y1="88" x2="890" y2="88"/>
  </g>
  <g font-size="14">
    <rect x="16" y="66" width="128" height="44" rx="8" fill="#12161D" stroke="#7C8896"/>
    <text x="80" y="93" text-anchor="middle" fill="#7C8896">audio_files</text>
    <rect x="168" y="66" width="120" height="44" rx="8" fill="#12161D" stroke="#E8A55C"/>
    <text x="228" y="93" text-anchor="middle" fill="#E8A55C">meta_raw</text>
    <rect x="312" y="66" width="120" height="44" rx="8" fill="#12161D" stroke="#E8A55C"/>
    <text x="372" y="93" text-anchor="middle" fill="#E8A55C">meta_qc</text>
    <rect x="476" y="66" width="120" height="44" rx="8" fill="#12161D" stroke="#5FB89A"/>
    <text x="536" y="93" text-anchor="middle" fill="#5FB89A">good_files</text>
    <rect x="620" y="66" width="96" height="44" rx="8" fill="#12161D" stroke="#5FB89A"/>
    <text x="668" y="93" text-anchor="middle" fill="#5FB89A">indices</text>
    <rect x="740" y="66" width="128" height="44" rx="8" fill="#211c14" stroke="#E8A55C"/>
    <text x="804" y="93" text-anchor="middle" fill="#ECEFF3">final_table</text>
    <rect x="892" y="66" width="96" height="44" rx="8" fill="#211c14" stroke="#E8A55C"/>
    <text x="940" y="93" text-anchor="middle" fill="#ECEFF3">final_csv</text>
  </g>
  <g stroke="#7C8896" stroke-width="1.6" marker-end="url(#par)" fill="none">
    <path d="M372,110 V167 H436"/>
    <path d="M372,110 V213 H436"/>
  </g>
  <g font-size="13.5">
    <rect x="440" y="150" width="150" height="34" rx="7" fill="#12161D" stroke="#E8A55C"/>
    <text x="515" y="171" text-anchor="middle" fill="#E8A55C">qc_report</text>
    <rect x="440" y="196" width="150" height="34" rx="7" fill="#12161D" stroke="#E8A55C"/>
    <text x="515" y="217" text-anchor="middle" fill="#E8A55C">gaps</text>
  </g>
  <g font-size="12.5" fill="#7C8896">
    <text x="600" y="171">resumen de QC</text>
    <text x="600" y="217">huecos de calendario</text>
    <text x="300" y="305">diseño de muestreo</text>
  </g>
  <line x1="144" y1="300" x2="166" y2="300" stroke="#7C8896" stroke-width="1.6" marker-end="url(#par)"/>
  <path d="M288,300 H804 V114" stroke="#E8A55C" stroke-width="1.6" stroke-dasharray="4 3" fill="none" marker-end="url(#parA)"/>
  <g font-size="14">
    <rect x="16" y="278" width="128" height="44" rx="8" fill="#12161D" stroke="#7C8896"/>
    <text x="80" y="305" text-anchor="middle" fill="#7C8896">sites_file</text>
    <rect x="168" y="278" width="120" height="44" rx="8" fill="#12161D" stroke="#7C8896"/>
    <text x="228" y="305" text-anchor="middle" fill="#7C8896">sites</text>
  </g>
  <text x="20" y="346" font-size="12.5" fill="#7C8896">Cada flecha = una dependencia que targets respeta · 11 objetivos · genéralo con tar_visnetwork()</text>
</svg>
