<svg viewBox="0 0 1000 380" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'IBM Plex Mono','Courier New',monospace">
  <title>Por qué importa la reproducibilidad</title>
  <desc>Tres entradas fijas (datos crudos inmutables, código, versiones de paquetes) pasan por un solo comando tar_make y producen siempre la misma tabla, para cualquiera y en cualquier momento.</desc>
  <rect x="0" y="0" width="1000" height="380" rx="14" fill="#0B0E13"/>
  <defs>
    <marker id="rar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#7C8896"/></marker>
    <marker id="rarA" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#E8A55C"/></marker>
  </defs>
  <text x="40" y="34" font-size="13" letter-spacing="2" fill="#5FB89A">ENTRADAS FIJAS</text>
  <!-- input boxes -->
  <g>
    <rect x="40" y="48" width="270" height="62" rx="9" fill="#12161D" stroke="#7C8896"/>
    <text x="60" y="78" font-size="14.5" fill="#ECEFF3">data_raw/</text>
    <text x="60" y="98" font-size="12.5" fill="#7C8896">RAW · inmutable, nunca se toca</text>
    <rect x="40" y="160" width="270" height="62" rx="9" fill="#12161D" stroke="#E8A55C"/>
    <text x="60" y="190" font-size="14.5" fill="#ECEFF3">R/ + _targets.R</text>
    <text x="60" y="210" font-size="12.5" fill="#E8A55C">el código del flujo</text>
    <rect x="40" y="272" width="270" height="62" rx="9" fill="#12161D" stroke="#5FB89A"/>
    <text x="60" y="302" font-size="14.5" fill="#ECEFF3">renv.lock</text>
    <text x="60" y="322" font-size="12.5" fill="#5FB89A">versiones de paquetes fijas</text>
  </g>
  <!-- arrows converging -->
  <g stroke="#7C8896" stroke-width="1.6" marker-end="url(#rar)" fill="none">
    <path d="M310,79 C370,79 360,150 416,158"/>
    <line x1="310" y1="191" x2="416" y2="191"/>
    <path d="M310,303 C370,303 360,232 416,224"/>
  </g>
  <!-- tar_make -->
  <rect x="420" y="146" width="190" height="92" rx="11" fill="#211c14" stroke="#E8A55C" stroke-width="1.5"/>
  <text x="515" y="188" text-anchor="middle" font-size="21" fill="#E8A55C">tar_make()</text>
  <text x="515" y="214" text-anchor="middle" font-size="13" fill="#7C8896">un solo comando</text>
  <!-- arrow to output -->
  <line x1="610" y1="192" x2="664" y2="192" stroke="#E8A55C" stroke-width="1.8" marker-end="url(#rarA)"/>
  <!-- output -->
  <rect x="668" y="160" width="300" height="64" rx="9" fill="#12161D" stroke="#E8A55C"/>
  <text x="818" y="198" text-anchor="middle" font-size="16" fill="#ECEFF3">tabla_analisis.csv</text>
  <!-- badge -->
  <text x="668" y="258" font-size="14" fill="#5FB89A">✓ El mismo resultado, siempre:</text>
  <text x="668" y="280" font-size="12.5" fill="#7C8896">tú · un becario nuevo · tú dentro de 3 años</text>
  <!-- caption -->
  <text x="40" y="366" font-size="13" fill="#7C8896">Reproducibilidad = el resultado no depende de quién lo corre, ni cuándo, ni en qué portátil.</text>
</svg>
